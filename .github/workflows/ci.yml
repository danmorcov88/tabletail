name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # A service container can't override the command, so we can't set
      # wal_level=logical that way. Run Postgres explicitly instead — the WAL
      # tests need logical decoding.
      - name: Start PostgreSQL (wal_level=logical)
        run: |
          docker run -d --name tabletail-pg \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=tabletail_test \
            -p 5432:5432 \
            postgres:16 -c wal_level=logical

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec tabletail-pg pg_isready -U postgres -d tabletail_test; then
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time" >&2
          docker logs tabletail-pg
          exit 1

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        env:
          TABLETAIL_TEST_DSN: postgres://postgres:postgres@localhost:5432/tabletail_test
          TABLETAIL_REQUIRE_DB: "1"
        run: pytest -v
